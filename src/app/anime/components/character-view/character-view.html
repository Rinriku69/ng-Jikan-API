
<div class="character-card">
    <a>
        <img
        [src]="data().images.webp.image_url"
        [alt]="data().name"
        />
    </a>
    <p>{{data().name}} ({{data().name_kanji}})</p>
    <p>Nick name {{data().nicknames}}</p>
    <p>Favorites {{data().favorites}}</p>
    <p>{{data().about}}</p>
 
</div>
