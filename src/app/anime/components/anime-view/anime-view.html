  <dl>
    <dt>Image</dt>
    @if(data().images.webp){
      <dd>
        <img
          [src]="data().images.webp.image_url"
          [alt]="data().title"
        />
      </dd>

    }@else {

      <dd>
        <img
          [src]="data().images.jpg.image_url"
          [alt]="data().title"
        />
      </dd>
    }

    <dt>Title</dt>
    <dd>{{ data().title }}</dd>

    <dt>Type</dt>
    <dd>{{ data().type }}</dd>

    <dt>Episodes</dt>
    <dd>{{ data().episodes }}</dd>

    <dt>Status</dt>
    <dd>{{ data().status }}</dd>

    <dt>Rating</dt>
    <dd>{{ data().rating }}</dd>

    <dt>Season</dt>
    <dd>{{ data().season }}</dd>
  </dl>
