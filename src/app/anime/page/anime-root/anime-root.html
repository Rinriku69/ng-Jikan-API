<main class="main">
 <div class="content">
    <div class="left-side">
<h1>
  <a routerLink="/anime/list" class="logo-link">
    <span class="logo-text">Anime Hub</span>
    <span class="logo-icon">( ͡° ͜ʖ ͡°)</span>
  </a>
</h1>    </div>
    <nav class="navbar">

<a routerLink="/anime/list" routerLinkActive="active-btn" class="nav-btn">
  <svg class="icon" viewBox="0 0 24 24">
    <rect x="4" y="5" width="16" height="3"/>
    <rect x="4" y="10" width="16" height="3"/>
    <rect x="4" y="15" width="16" height="3"/>
  </svg>
  List Anime
</a>

<a routerLink="/anime/top" routerLinkActive="active-btn" class="nav-btn">
  <svg class="icon" viewBox="0 0 24 24">
    <path d="M12 17.27L18.18 21L16.54 13.97L22 9.24L14.81 8.63L12 2L9.19 8.63L2 9.24L7.46 13.97L5.82 21Z"/>
  </svg>
  Top Anime
</a>

<a routerLink="/anime/season" routerLinkActive="active-btn" class="nav-btn">
  <svg class="icon" viewBox="0 0 24 24">
    <rect x="3" y="5" width="18" height="14" rx="2"/>
    <polygon points="10,9 16,12 10,15"/>
  </svg>
  Season Now
</a>
<div class="search-box">
        <input 
          type="text" 
          [value]="searchQuery()" 
          (input)="onSearchInput($event)"
          (keyup.enter)="onGlobalSearch()"
          placeholder="Search anime..."
        />
        <button (click)="onGlobalSearch()">Search</button>
      </div>
    </nav>

<main class="content-area">
  <router-outlet></router-outlet>
</main>

    <footer class="footer">
      <p>ANIME HUB</p>
    </footer>
  </div>
</main>
