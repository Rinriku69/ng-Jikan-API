@if (resource.hasValue() && characterResource.hasValue()) {
  <app-anime-view [data]="resource.value().data" [characters]="characterResource.value().data"/>
} @else if (resource.error(); as error) {
<div class="nf">
  <p>Not Found</p>
</div>
} @else if (resource.isLoading()) {
  <p class="status">Loading...</p>

}
